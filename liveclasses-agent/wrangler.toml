name = "liveclasses-agent"
main = "src/index.ts"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "liveclasses-db"
database_id = "a0f223d8-ae98-4aa9-be72-fefb65745af7"

[triggers]
crons = [
  "0 7 * * *"      # 10:00 МСК (07:00 UTC) - ежедневный дайджест статей
]

[vars]
TIMEZONE = "Europe/Moscow"
MODEL = "deepseek/deepseek-v3.2"
ROUTERAI_BASE_URL = "https://routerai.ru/api/v1"

# Секреты (задаются через wrangler secret put)
# TELEGRAM_BOT_TOKEN
# DEEPSEEK_API_KEY
# ADMIN_TELEGRAM_ID (опционально)

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }
